<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVAMRU - Coming Soon</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6a0572, #a4508b, #ff758c);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 1rem;
        }

        .moon {
            position: absolute;
            top: 10%;
            left: -10%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff, #ddd);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 1;
            animation: moveMoon 20s linear infinite;
        }

        @keyframes moveMoon {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }

        .leaves {
            position: absolute;
            top: -10%;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: fall 5s linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .birds {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: visible;
        }

        .bird {
            position: absolute;
            width: 80px;
            height: 50px;
        }

        .bird svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 1px 2px rgba(255, 255, 255, 0.4));
        }

        .wing {
            transform-origin: 50px 35px;
            animation: flap 1.2s infinite ease-in-out;
        }

        @keyframes flap {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-20deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(20deg); }
            100% { transform: rotate(0deg); }
        }

        .feather {
            animation: floatFeather 2s infinite ease-in-out;
            opacity: 0.6;
        }

        .feather1 {
            animation-delay: 0s;
        }

        .feather2 {
            animation-delay: 0.4s;
        }

        .feather3 {
            animation-delay: 0.8s;
        }

        @keyframes floatFeather {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-4px) rotate(5deg); opacity: 0.8; }
        }

        .b1 {
            top: 80px;
            animation: flyBird1 45s linear infinite;
        }
        .b2 {
            top: 180px;
            animation: flyBird2 50s linear infinite;
            animation-delay: 5s;
        }
        .b3 {
            top: 130px;
            animation: flyBird3 48s linear infinite;
            animation-delay: 10s;
        }
        .b4 {
            top: 220px;
            animation: flyBird4 52s linear infinite;
            animation-delay: 15s;
        }

        @keyframes flyBird1 {
            0% { left: -80px; }
            100% { left: calc(100vw + 80px); }
        }

        @keyframes flyBird2 {
            0% { left: -80px; }
            100% { left: calc(100vw + 80px); }
        }

        @keyframes flyBird3 {
            0% { left: -80px; }
            100% { left: calc(100vw + 80px); }
        }

        @keyframes flyBird4 {
            0% { left: -80px; }
            100% { left: calc(100vw + 80px); }
        }

        .glass-card {
            position: relative;
            z-index: 4;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            margin: auto;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .message {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .date-time {
            font-size: 1rem;
            margin-top: 1rem;
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            z-index: 5;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .glass-card {
                padding: 1.5rem;
                max-width: 350px;
            }

            .logo {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .message {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 768px) {
            .glass-card {
                padding: 1rem;
                max-width: 300px;
            }

            .logo {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .message {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 375px) {
            .glass-card {
                padding: 0.8rem;
                max-width: 280px;
            }

            .logo {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 0.9rem;
            }

            .message {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

        <div class="glass-card">

    <script>
        // Generate leaves
        const leavesContainer = document.getElementById('leaves');
        for (let i = 0; i < 50; i++) {
            const leaf = document.createElement('div');
            leaf.classList.add('leaf');
            leaf.style.left = `${Math.random() * 100}%`;
            leaf.style.animationDelay = `${Math.random() * 5}s`;
            leaf.style.animationDuration = `${Math.random() * 5 + 5}s`;
            leavesContainer.appendChild(leaf);
        }

        // Update date and time
        const dateTimeElement = document.getElementById('date-time');
        function updateDateTime() {
            const now = new Date();
            const date = now.toLocaleDateString();
            const time = now.toLocaleTimeString();
            dateTimeElement.textContent = `${date} | ${time}`;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
