<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVAMRU - Coming Soon</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            overflow: hidden;
            color: white;
        }

        @keyframes rainbowGlow {
            0% { border-color: #ff0080; box-shadow: 0 0 20px #ff0080, 0 0 40px #ff0080, inset 0 0 20px #ff0080; }
            16% { border-color: #ff8c00; box-shadow: 0 0 20px #ff8c00, 0 0 40px #ff8c00, inset 0 0 20px #ff8c00; }
            33% { border-color: #ffff00; box-shadow: 0 0 20px #ffff00, 0 0 40px #ffff00, inset 0 0 20px #ffff00; }
            50% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00, inset 0 0 20px #00ff00; }
            66% { border-color: #0080ff; box-shadow: 0 0 20px #0080ff, 0 0 40px #0080ff, inset 0 0 20px #0080ff; }
            83% { border-color: #8000ff; box-shadow: 0 0 20px #8000ff, 0 0 40px #8000ff, inset 0 0 20px #8000ff; }
            100% { border-color: #ff0080; box-shadow: 0 0 20px #ff0080, 0 0 40px #ff0080, inset 0 0 20px #ff0080; }
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 1rem;
        }

        .moon {
            position: absolute;
            top: 10%;
            left: -10%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff, #ddd);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 1;
            animation: moveMoon 20s linear infinite;
        }

        @keyframes moveMoon {
            0% { transform: translateX(0); }
            100% { transform: translateX(120vw); }
        }

        .leaves {
            position: absolute;
            top: -10%;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: fall 5s linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .birds {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: visible;
        }

        .bird {
            position: absolute;
            width: 80px;
            height: 50px;
        }

        .bird svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 1px 2px rgba(255, 255, 255, 0.4));
        }

        .wing {
            transform-origin: 50px 35px;
            animation: flap 1.2s infinite ease-in-out;
        }

        @keyframes flap {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-20deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(20deg); }
            100% { transform: rotate(0deg); }
        }

        .feather {
            animation: floatFeather 2s infinite ease-in-out;
            opacity: 0.6;
        }

        .feather1 {
            animation-delay: 0s;
        }

        .feather2 {
            animation-delay: 0.4s;
        }

        .feather3 {
            animation-delay: 0.8s;
        }

        @keyframes floatFeather {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-4px) rotate(5deg); opacity: 0.8; }
        }

        .b1 {
            top: 80px;
            animation: flyBird1 45s linear infinite;
        }
        .b2 {
            top: 180px;
            animation: flyBird2 50s linear infinite;
            animation-delay: 5s;
        }
        .b3 {
            top: 130px;
            animation: flyBird3 48s linear infinite;
            animation-delay: 10s;
        }
        .b4 {
            top: 220px;
            animation: flyBird4 52s linear infinite;
            animation-delay: 15s;
        }

        @keyframes flyBird1 {
            0% { left: -80px; }
            100% { left: calc(100vw + 80px); }
        }

        @keyframes flyBird2 {
            0% { left: -80px; }
            100% { left: calc(100vw + 80px); }
        }

        @keyframes flyBird3 {
            0% { left: -80px; }
            100% { left: calc(100vw + 80px); }
        }

        @keyframes flyBird4 {
            0% { left: -80px; }
            100% { left: calc(100vw + 80px); }
        }

        .glass-card {
            position: relative;
            z-index: 4;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            text-align: center;
            max-width: 400px;
            margin: auto;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
            color: #ffffff;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            color: #ffffff;
            opacity: 0.9;
        }

        .tagline p {
            margin: 0.5rem 0;
        }

        .subtitle {
            display: none;
        }

        .message {
            display: none;
        }

        .moon {
            display: none;
        }

        .leaves {
            display: none;
        }

        .birds {
            display: none;
        }

        .glass-card {
            display: none;
        }

        .centered-text {
            display: none;
        }

        .neon-container {
            padding: 3rem 4rem;
            border: 3px solid #ff0080;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            animation: rainbowGlow 6s ease infinite;
            text-align: center;
            box-shadow: 0 0 30px #ff0080, inset 0 0 30px rgba(255, 0, 128, 0.2);
        }

        .digital-clock {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            font-family: 'Courier New', monospace;
            color: #00ff00;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            z-index: 5;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .neon-container {
                padding: 2rem 2.5rem;
            }

            .logo {
                font-size: 2rem;
                margin-bottom: 1.5rem;
            }

            .digital-clock {
                font-size: 3rem;
            }
        }

        @media (max-width: 480px) {
            .neon-container {
                padding: 1.5rem 2rem;
            }

            .logo {
                font-size: 1.5rem;
                margin-bottom: 1rem;
            }

            .digital-clock {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="neon-container">
            <h1 class="logo">A V A M R U</h1>
            <div class="tagline">
                <p>Big dreams are under construction.</p>
                <p>Driven by innovation. Built with purpose.</p>
                <p>Coming Soon</p>
                <p>United States of America</p>
            </div>
            <div class="digital-clock" id="digital-clock">00:00:00 AM</div>
        </div>
        <footer>© 2026 AVAMRU. All rights reserved.</footer>
    </div>
    <script>
        // Digital Clock Implementation
        const digitalClockElement = document.getElementById('digital-clock');

        function updateDigitalClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 should be 12
            hours = String(hours).padStart(2, '0');
            digitalClockElement.textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
        }

        // Initialize and update every second
        updateDigitalClock();
        setInterval(updateDigitalClock, 1000);
    </script>
</body>
</html>
